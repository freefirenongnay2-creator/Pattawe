<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชีหอพัก - โครงสร้างใหม่</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden">
        <!-- Header -->
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">หอ 8 ไผ่สีทอง</h1>
                <p class="text-blue-100">ระบบจัดการบัญชีรายรับ-รายจ่าย</p>
            </div>
            <div class="text-right">
                <p class="text-sm">ยอดเงินคงเหลือรวม</p>
                <div id="total-balance" class="text-3xl font-bold">0.00 บาท</div>
            </div>
        </header>

        <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Form -->
            <div class="md:col-span-1 bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h2 class="font-bold mb-4 text-gray-700">บันทึกรายการ</h2>
                <input type="text" id="room" placeholder="เลขห้อง" class="w-full p-2 border rounded mb-2">
                <input type="text" id="name" placeholder="ชื่อ-นามสกุล" class="w-full p-2 border rounded mb-2">
                <input type="number" id="amount" placeholder="จำนวนเงิน" class="w-full p-2 border rounded mb-4">
                
                <div class="flex gap-2">
                    <button onclick="saveData('income')" class="flex-1 bg-green-600 text-white py-2 rounded hover:bg-green-700">รับ (+)</button>
                    <button onclick="saveData('expense')" class="flex-1 bg-red-600 text-white py-2 rounded hover:bg-red-700">จ่าย (-)</button>
                </div>
            </div>

            <!-- Table -->
            <div class="md:col-span-2">
                <table class="w-full text-left">
                    <thead class="border-b">
                        <tr>
                            <th class="p-2">ห้อง</th>
                            <th class="p-2">ชื่อ</th>
                            <th class="p-2 text-right">จำนวน</th>
                            <th class="p-2 text-center">ลบ</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('my_ledger')) || [];

        function render() {
            const tbody = document.getElementById('transaction-body');
            const totalEl = document.getElementById('total-balance');
            tbody.innerHTML = '';
            
            let total = 0;
            transactions.forEach((t, index) => {
                total += t.amount;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2">${t.room}</td>
                        <td class="p-2">${t.name}</td>
                        <td class="p-2 text-right font-bold ${t.amount > 0 ? 'text-green-600' : 'text-red-600'}">
                            ${t.amount.toLocaleString()}
                        </td>
                        <td class="p-2 text-center">
                            <button onclick="deleteData(${index})" class="text-red-400 hover:text-red-600">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            totalEl.innerText = total.toLocaleString() + ' บาท';
            localStorage.setItem('my_ledger', JSON.stringify(transactions));
        }

        function saveData(type) {
            const room = document.getElementById('room').value;
            const name = document.getElementById('name').value;
            let amount = parseFloat(document.getElementById('amount').value);
            
            if(!room || !name || !amount) return alert("กรุณากรอกข้อมูลให้ครบ");

            amount = (type === 'expense') ? -amount : amount;
            transactions.push({ room, name, amount });
            render();
            // ล้างฟอร์ม
            document.getElementById('room').value = '';
            document.getElementById('name').value = '';
            document.getElementById('amount').value = '';
        }

        function deleteData(index) {
            transactions.splice(index, 1);
            render();
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        render();
    </script>
</body>
</html>
