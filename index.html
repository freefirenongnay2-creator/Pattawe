<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการการเงิน หอ 8 ไผ่สีทอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; }
        .main-card { background: white; width: 100%; max-width: 1000px; margin: auto; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #2563eb; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
        .input-box { background: #f1f5f9; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-plus { background: #2563eb; }
        .btn-minus { background: #ef4444; }
        .btn-save { background: #1e40af; width: 100%; margin-top: 10px; }
        .list-area { border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div><h3>หอ 8 ไผ่สีทอง</h3><small>ผู้ดูแลระบบ: Vadaw216</small></div>
        <div style="text-align: right;"><div>ยอดเงินคงเหลือรวม</div><h2 id="total">0.00 บาท</h2></div>
    </div>
    <div class="content">
        <div class="input-box">
            <h4>บันทึกข้อมูลธุรกรรม</h4>
            <input type="text" id="num" placeholder="เลขที่ / เลขห้อง">
            <div style="display: flex; gap: 5px;">
                <select style="width: 80px;"><option>นาย</option></select>
                <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
            </div>
            <input type="number" id="amount" placeholder="0.00">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-plus" onclick="setOp('plus')">มีเงิน (บวกเงิน)</button>
                <button class="btn btn-minus" onclick="setOp('minus')">รายลบ (ลบเงิน)</button>
            </div>
            <button class="btn btn-save" onclick="save()">บันทึกข้อมูล</button>
        </div>
        <div class="list-area" id="list">
            <p>ยังไม่มีรายการ</p>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('ledger') || '[]');
    let currentOp = 'plus';

    function setOp(op) { currentOp = op; alert('เลือกโหมด: ' + op); }

    function save() {
        const num = document.getElementById('num').value;
        const name = document.getElementById('name').value;
        // ใช้ Math.abs เพื่อความแม่นยำ ไม่ว่าจะใส่ลบหรือไม่ก็ตาม
        const amount = Math.abs(parseFloat(document.getElementById('amount').value) || 0);
        if(!num || !name || amount === 0) return alert('กรอกข้อมูลไม่ครบ');
        
        data.push({ num, name, amount, type: currentOp });
        localStorage.setItem('ledger', JSON.stringify(data));
        render();
    }

    function render() {
        let total = 0;
        let html = '<table style="width:100%"><tr><th>เลขที่</th><th>ชื่อ</th><th>จำนวน</th></tr>';
        data.forEach(item => {
            total += (item.type === 'plus' ? item.amount : -item.amount);
            html += `<tr><td>${item.num}</td><td>${item.name}</td><td>${item.type==='plus'?'+':'-'}${item.amount}</td></tr>`;
        });
        document.getElementById('total').innerText = total.toFixed(2) + ' บาท';
        document.getElementById('list').innerHTML = html + '</table>';
    }
    render();
</script>

</body>
</html>
