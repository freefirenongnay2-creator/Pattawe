<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบัญชีหอพัก - หอ 8 ไผ่สีทอง</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="หอ 8 ไผ่สีทอง">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        /* แถบแจ้งเตือนติดตั้งแอปสำหรับมือถือ */
        .pwa-banner {
            display: none;
            width: 100%;
            max-width: 400px;
            background: #2ecc71;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }

        .pwa-banner text {
            font-size: 14px;
            font-weight: 500;
        }

        .pwa-btn {
            background: white;
            color: #2ecc71;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* การ์ดหลักหน้าล็อกอิน */
        .login-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 24px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 6px;
        }

        p.subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 24px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px; /* ป้องกัน iOS ซูมหน้าจอตอนคลิกพิมพ์ */
            outline: none;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .input-group input:focus {
            border-color: #3498db;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        /* ปุ่มล็อกอิน */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #2980b9;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* เครดิตท้ายหน้า */
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #7f8c8d;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- แถบชวนโหลดแอป -->
    <div class="pwa-banner" id="pwaBanner">
        <span>ดาวน์โหลดแอปไว้บนมือถือใช้งานง่ายขึ้น</span>
        <button class="pwa-btn" id="pwaBtn">โหลดแอป</button>
    </div>

    <!-- กล่องเข้าสู่ระบบ -->
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">🏢</div>
            <h1>หอ 8 ไผ่สีทอง</h1>
            <p class="subtitle">ระบบจัดการบัญชีและห้องพัก</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน / เลขห้อง</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        </form>

        <div class="footer">
            &copy; 2026 หอ 8 ไผ่สีทอง. All Rights Reserved.
        </div>
    </div>

    <script>
        // ฟังก์ชันเมื่อกดปุ่มล็อกอิน
        function handleLogin(event) {
            event.preventDefault();
            alert('ยินดีด้วยครับพี่! ระบบล็อกอินเชื่อมต่อสำเร็จแล้ว');
            // พี่สามารถใส่โค้ดเปลี่ยนหน้าหลักหรือทำงานต่อตรงนี้ได้เลยครับ
        }

        // ระบบตรวจจับเพื่อแสดงปุ่มติดตั้งแอปพลิเคชัน (PWA)
        let deferredPrompt;
        const pwaBanner = document.getElementById('pwaBanner');
        const pwaBtn = document.getElementById('pwaBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            pwaBanner.style.display = 'flex'; // แสดงแถบดาวน์โหลดใน Android/PC
        });

        pwaBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    pwaBanner.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // ตรวจจับว่าเป็น iOS หรือไม่ เพื่อทำแถบแนะนำพิเศษ (ถ้าต้องการเพิ่มเติม)
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        }
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        if (isIos() && !isInStandaloneMode()) {
            // หากเป็น iPhone สามารถเปิดแถบแนะนำให้กด "เพิ่มไปยังหน้าจอโฮม" ตรงนี้ได้ครับ
        }
    </script>
</body>
</html>
