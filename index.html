<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบัญชี หอ 8 ไผ่สีทอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #eef2f6; padding: 20px; }
        .main-card { background: white; max-width: 1000px; margin: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1e40af; color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 25px; }
        .input-box { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .btn-edit { background: #f59e0b; padding: 5px 10px; margin-right: 5px; }
        .btn-del { background: #ef4444; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div><h3>หอ 8 ไผ่สีทอง</h3><small>ระบบจัดการเงิน</small></div>
        <div style="text-align: right;"><div>ยอดเงินคงเหลือ</div><h2 id="total">0.00 บาท</h2></div>
    </div>
    <div class="content">
        <div class="input-box">
            <h4>บันทึกรายการ</h4>
            <input type="hidden" id="edit-index">
            <input type="text" id="num" placeholder="เลขห้อง">
            <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
            <input type="number" id="amount" placeholder="จำนวนเงิน">
            <select id="type">
                <option value="plus">บวกเงิน (+)</option>
                <option value="minus">ลบเงิน (-)</option>
            </select>
            <button class="btn" style="background:#1e40af; width:100%" onclick="save()">บันทึกรายการ</button>
        </div>
        <div class="list-area">
            <table>
                <thead><tr><th>ห้อง</th><th>ชื่อ</th><th>จำนวน</th><th>จัดการ</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('ledger_v9') || '[]');

    function save() {
        const index = document.getElementById('edit-index').value;
        const num = document.getElementById('num').value;
        const name = document.getElementById('name').value;
        const amount = Math.abs(parseFloat(document.getElementById('amount').value) || 0);
        const type = document.getElementById('type').value;

        if(!num || !name) return alert('กรอกข้อมูลให้ครบครับ');

        const item = { num, name, amount, type };
        if(index === "") data.push(item);
        else data[index] = item;

        localStorage.setItem('ledger_v9', JSON.stringify(data));
        clearForm();
        render();
    }

    function edit(i) {
        document.getElementById('edit-index').value = i;
        document.getElementById('num').value = data[i].num;
        document.getElementById('name').value = data[i].name;
        document.getElementById('amount').value = data[i].amount;
        document.getElementById('type').value = data[i].type;
    }

    function del(i) {
        if(confirm('ลบรายการนี้ใช่ไหม?')) {
            data.splice(i, 1);
            localStorage.setItem('ledger_v9', JSON.stringify(data));
            render();
        }
    }

    function clearForm() {
        document.getElementById('edit-index').value = "";
        document.getElementById('num').value = "";
        document.getElementById('name').value = "";
        document.getElementById('amount').value = "";
    }

    function render() {
        let total = 0;
        let html = '';
        data.forEach((item, i) => {
            total += (item.type === 'plus' ? item.amount : -item.amount);
            html += `<tr><td>${item.num}</td><td>${item.name}</td>
                     <td style="color:${item.type==='plus'?'blue':'red'}">${item.type==='plus'?'+':'-'}${item.amount}</td>
                     <td><button class="btn btn-edit" onclick="edit(${i})">แก้</button>
                         <button class="btn btn-del" onclick="del(${i})">ลบ</button></td></tr>`;
        });
        document.getElementById('table-body').innerHTML = html;
        document.getElementById('total').innerText = total.toFixed(2) + ' บาท';
    }
    render();
</script>

</body>
</html>
