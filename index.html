<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชีหอพัก - หอ 8 ไผ่สีทอง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
        
        <!-- ส่วนหัว (Header) -->
        <div class="bg-blue-700 px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center text-white text-xl">
                    <i class="fa-solid fa-house-user"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg">หอ 8 ไผ่สีทอง | ระบบบัญชีหอพัก</h1>
                    <p class="text-blue-200 text-xs">ผู้ดูแลระบบ: Vadaw216</p>
                </div>
            </div>
            
            <div class="bg-blue-900/50 px-6 py-3 rounded-xl border border-blue-600 text-right">
                <p class="text-blue-200 text-xs">ยอดเงินคงเหลือรวม</p>
                <p id="total-balance" class="text-2xl font-bold text-white">40.00 บาท</p>
            </div>
            
            <button class="px-4 py-2 bg-blue-800 hover:bg-blue-900 text-white rounded-lg text-xs transition">
                <i class="fa-solid fa-power-off mr-1"></i> ออกจากระบบ
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-0">
            <!-- ส่วนบันทึกข้อมูล (ฝั่งซ้าย) -->
            <div class="p-6 border-r border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-file-pen text-blue-600"></i> บันทึกข้อมูลธุรกรรม
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-slate-500">ช่องที่ 1: เลขที่ / เลขห้อง</label>
                        <input type="text" class="w-full mt-1 px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="เช่น 101, 805">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500">ช่องที่ 2: คำนำหน้า และ ชื่อ-นามสกุล</label>
                        <div class="flex gap-2 mt-1">
                            <select class="px-2 py-2 border border-slate-200 rounded-lg text-sm">
                                <option>นาย</option>
                            </select>
                            <input type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="ชื่อ-นามสกุล">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500">ช่องที่ 3: จำนวนเงิน และประเภท</label>
                        <input type="number" class="w-full mt-1 px-3 py-2 border border-slate-200 rounded-lg text-sm mb-2" placeholder="0.00">
                        <div class="grid grid-cols-2 gap-2">
                            <button class="py-2 border border-blue-600 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-50">
                                <i class="fa-solid fa-circle-plus mr-1"></i> มีเงิน (บวกเงิน)
                            </button>
                            <button class="py-2 border border-slate-200 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-50">
                                <i class="fa-solid fa-circle-minus mr-1"></i> รายลบ (ลบเงิน)
                            </button>
                        </div>
                    </div>
                    <button class="w-full py-3 bg-blue-700 text-white rounded-xl font-bold hover:bg-blue-800 transition">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกข้อมูล
                    </button>
                </div>
            </div>

            <!-- ส่วนแสดงผล (ฝั่งขวา) -->
            <div class="lg:col-span-2 p-6 bg-slate-50/50">
                <div class="flex bg-white p-1 rounded-lg border border-slate-200 mb-6 w-fit">
                    <button class="px-6 py-2 bg-slate-100 rounded-md text-xs font-bold text-slate-800"><i class="fa-solid fa-list mr-1"></i> ทั้งหมด</button>
                    <button class="px-6 py-2 text-xs font-bold text-slate-500"><i class="fa-solid fa-circle-plus mr-1"></i> มีเงิน (บวกเงิน)</button>
                    <button class="px-6 py-2 text-xs font-bold text-slate-500"><i class="fa-solid fa-circle-minus mr-1"></i> รายลบ (ลบเงิน)</button>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-800"><i class="fa-solid fa-list-ol mr-2"></i> รายการข้อมูลทั้งหมด</h3>
                    <span class="text-xs font-bold text-slate-500">2 รายการ</span>
                </div>

                <table class="w-full text-left bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-3 text-xs text-slate-500 uppercase">เลขที่</th>
                            <th class="p-3 text-xs text-slate-500 uppercase">ชื่อ - นามสกุล</th>
                            <th class="p-3 text-xs text-slate-500 uppercase">จำนวนเงิน</th>
                            <th class="p-3 text-xs text-slate-500 uppercase text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr>
                            <td class="p-3 font-bold">1</td>
                            <td class="p-3">นายปฐวี</td>
                            <td class="p-3 font-bold text-blue-600">+50.00</td>
                            <td class="p-3 text-center text-slate-400"><i class="fa-solid fa-user-pen mr-3"></i><i class="fa-solid fa-trash"></i></td>
                        </tr>
                        <tr>
                            <td class="p-3 font-bold">1</td>
                            <td class="p-3">นายปฐวี</td>
                            <td class="p-3 font-bold text-red-500">-10.00</td>
                            <td class="p-3 text-center text-slate-400"><i class="fa-solid fa-user-pen mr-3"></i><i class="fa-solid fa-trash"></i></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
