<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการการเงิน หอ 8 ไผ่สีทอง</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; cursor: pointer; font-weight: bold; }
        #list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3>บัญชีหอพัก</h3>
    <h2 id="total">0.00 บาท</h2>
    <input type="number" id="num" placeholder="เลขห้อง">
    <input type="text" id="name" placeholder="ชื่อ">
    <input type="number" id="amount" placeholder="จำนวนเงิน">
    <select id="type">
        <option value="plus">บวกเงิน</option>
        <option value="minus">ลบเงิน</option>
    </select>
    <button onclick="save()">บันทึก</button>
    <div id="list"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('ledger_data') || '[]');

    function save() {
        const num = document.getElementById('num').value;
        const name = document.getElementById('name').value;
        // ใช้ Math.abs เพื่อดึงแค่ตัวเลขมาคำนวณ ป้องกันปัญหาเครื่องหมายติดลบ
        const amount = Math.abs(parseFloat(document.getElementById('amount').value) || 0);
        const type = document.getElementById('type').value;

        if(!num || !name || amount === 0) return alert('กรอกข้อมูลให้ครบ');

        data.push({ num, name, amount, type });
        localStorage.setItem('ledger_data', JSON.stringify(data));
        render();
    }

    function render() {
        let total = 0;
        let html = '';
        data.forEach(item => {
            // คำนวณแบบตรงไปตรงมา: บวกคือบวก ลบคือลบ
            total += (item.type === 'plus' ? item.amount : -item.amount);
            html += `<p>${item.num}: ${item.type === 'plus' ? '+' : '-'}${item.amount}</p>`;
        });
        document.getElementById('total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + ' บาท';
        document.getElementById('list').innerHTML = html;
    }

    render(); // เรียกให้แสดงผลทันทีที่โหลดหน้าเว็บ
</script>

</body>
</html>
