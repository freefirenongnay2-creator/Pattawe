<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ระบบบัญชีหอพัก</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 rounded-lg flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold">หอ 8 ไผ่สีทอง | ระบบบัญชีหอพัก</h1>
                <p>ผู้ดูแลระบบ: Vadaw216</p>
            </div>
            <div class="text-right">
                <p class="text-sm">ยอดเงินคงเหลือรวม</p>
                <p class="text-2xl font-bold" id="totalBalance">0.00 บาท</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Form -->
            <div>
                <h2 class="font-bold mb-4">บันทึกข้อมูลธุรกรรม</h2>
                <input type="text" id="room" placeholder="เลขที่ห้อง" class="w-full border p-2 mb-2 rounded">
                <input type="text" id="name" placeholder="ชื่อ-นามสกุล" class="w-full border p-2 mb-2 rounded">
                <input type="number" id="amount" placeholder="0.00" class="w-full border p-2 mb-4 rounded">
                <div class="flex gap-2">
                    <button onclick="addTransaction(true)" class="bg-blue-600 text-white px-4 py-2 rounded">บวกเงิน</button>
                    <button onclick="addTransaction(false)" class="bg-red-500 text-white px-4 py-2 rounded">รายจ่าย</button>
                </div>
            </div>

            <!-- List -->
            <div>
                <table class="w-full">
                    <thead>
                        <tr class="border-b">
                            <th class="text-left">เลขที่</th>
                            <th class="text-left">ชื่อ</th>
                            <th class="text-right">จำนวน</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;
        function addTransaction(isIncome) {
            const amount = parseFloat(document.getElementById('amount').value);
            const name = document.getElementById('name').value;
            const room = document.getElementById('room').value;
            
            if (!amount || !name) return alert("กรุณากรอกข้อมูลให้ครบ");

            const finalAmount = isIncome ? amount : -amount;
            balance += finalAmount;

            const tbody = document.getElementById('transactionList');
            tbody.innerHTML += `
                <tr class="border-b">
                    <td>${room}</td>
                    <td>${name}</td>
                    <td class="text-right ${isIncome ? 'text-blue-600' : 'text-red-500'}">
                        ${isIncome ? '+' : ''}${finalAmount.toFixed(2)}
                    </td>
                </tr>
            `;
            document.getElementById('totalBalance').innerText = balance.toFixed(2) + " บาท";
        }
    </script>
</body>
</html>
